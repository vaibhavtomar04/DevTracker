# Server configuration
server.port=8080
server.servlet.context-path=${SERVER_CONTEXT_PATH:/devtrack}

# Absolute path to external email templates directory (leave blank to use bundled classpath templates).
# Set via env var MAIL_TEMPLATES_DIR — no restart needed when editing templates in this directory.
# Example: /opt/devtrack/templates
devtrack.mail.templates-dir=${MAIL_TEMPLATES_DIR:/app/server/HOBS-MicroServices/configuration/com/tcs/telecom/tib/notify/devtrack/EmailTemplates}



# Canonical Database configurations matching Workbench schema (localhost:3306/devtrack)
spring.devtrack-datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:devtrack}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.devtrack-datasource.username=${DB_USER:devtrack}
spring.devtrack-datasource.password=${DB_PASSWORD:devtrack}
spring.devtrack-datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.devtrack-datasource.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.devtrack-datasource.hibernate.ddl-auto=none
spring.devtrack-datasource.show-sql=false
spring.devtrack-datasource.maximumPoolSize=30
spring.devtrack-datasource.minimumIdle=5
spring.devtrack-datasource.poolName=DevTrackHikariPool
spring.devtrack-datasource.idleTimeout=600000
spring.devtrack-datasource.maxLifetime=1800000

# HikariCP properties
spring.devtrack-datasource.leakDetectionThreshold=0
spring.devtrack-datasource.minimumIdle=2
spring.devtrack-datasource.readOnly=false
spring.devtrack-datasource.schema=
spring.devtrack-datasource.transactionIsolation=
spring.devtrack-datasource.validationTimeout=5000
spring.devtrack-datasource.connectionInitSql=
spring.devtrack-datasource.initializationFailTimeout=1

# ── Flyway Migration Configuration ─────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=true
spring.flyway.ignore-migration-patterns=*:missing

# Standard Spring Boot DataSource fallback
spring.datasource.url=${spring.devtrack-datasource.url}
spring.datasource.username=${spring.devtrack-datasource.username}
spring.datasource.password=${spring.devtrack-datasource.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# CORS allowed origins configuration
devtrack.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Spring Mail Sender (SMTP configuration via environment variables - DEPRECATED)
# spring.mail.host=${MAIL_HOST:smtp.gmail.com}
# spring.mail.port=${MAIL_PORT:587}
# spring.mail.username=${MAIL_USERNAME:noreply@devtrack.com}
# spring.mail.password=${MAIL_PASSWORD:secret}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Notification & Business Email templates
send.notification.url=${SEND_NOTIFICATION_URL:***REMOVED***}
testing.mail.sender=
uat.testComplete.mail.body=CR UAT Testing Completed
mail.developers=
#mail.developers=
mail.reviewer=
#mail.reviewer=
mail.devops=
mail.devops.cc=
testing.mail.cc=
#testing.mail.cc=
review.mail.cc=
#review.mail.cc=
devtrack.mail.logo-url=http://localhost:8080/logo.png
devtrack.mail.base-url=http://localhost:5173
# Maximum email attachment size in MB before falling back to download URL link
devtrack.mail.max-attachment-size-mb=${MAX_ATTACHMENT_SIZE_MB:10}



# Security & Lockout Rules
devtrack.security.max-failed-attempts=${MAX_FAILED_ATTEMPTS:5}
devtrack.security.lock-duration-minutes=${LOCK_DURATION_MINS:15}
devtrack.security.temp-password-ttl-hours=${TEMP_PASS_TTL_HOURS:24}

# JWT config
devtrack.jwtSecret=${DEVTRACK_JWT_SECRET:devtrack-super-secret-key-12345-devtrack-super-secret-key-12345}
devtrack.jwtExpirationMs=86400000
# ── Multipart / File Upload ──────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.file-size-threshold=2MB

# ── Document Service ─────────────────────────────────────────────────────────
document.max-size-bytes=26214400

# ── OpenAPI 3 / Swagger UI ───────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Log Levels ───────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.devtrack.api=INFO

# Backend base URL for email download links
devtrack.backend.base-url=${BACKEND_BASE_URL:http://localhost:8080}

# ── HTTP Response Compression (GZIP) ─────────────────────────
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024


